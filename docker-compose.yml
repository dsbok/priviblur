services:
  priviblur:
    image: ghcr.io/dsbok/priviblur:latest
    container_name: priviblur
    restart: unless-stopped
    ports:
      - "8009:8000" # Change to "127.0.0.1:8000:8000" if using reverse proxy
    environment:
      - PRIVIBLUR_DEPLOYMENT_HOST=0.0.0.0
      - PRIVIBLUR_DEPLOYMENT_PORT=8000
      - PRIVIBLUR_DEPLOYMENT_HTTPS=true
      - PRIVIBLUR_DEPLOYMENT_WORKERS=4
      - PRIVIBLUR_DEFAULT_USER_PREFERENCES_THEME=dark
      - PRIVIBLUR_DEFAULT_USER_PREFERENCES_LANGUAGE=en_US
      - PRIVIBLUR_DEFAULT_USER_PREFERENCES_EXPAND_POSTS=true
